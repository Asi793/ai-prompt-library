server {
    listen 80;
    server_name localhost;

    # Use Docker's internal DNS so nginx re-resolves 'backend' on each request
    # instead of caching the address at startup (before Django is ready)
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Serve Angular app — handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Django backend
    location /api/ {
        set $backend_url http://backend:8000;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
